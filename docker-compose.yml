services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"
    command: ./realestate-mgmt
    stdin_open: true
    tty: true
